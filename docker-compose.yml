version: "3.9"

services:
  functions:
    image: mcr.microsoft.com/azure-functions/python:4-python3.10
    container_name: azfunc
    ports:
      - "7071:80"
    expose:
      - 80
    volumes:
      - .:/home/site/wwwroot
    environment:
      - AzureWebJobsScriptRoot=/home/site/wwwroot
      - AzureFunctionsJobHost__Logging__Console__IsEnabled=true

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-rp
    ports:
      - "8443:443"
    volumes:
      - ./docker-utils/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker-utils/https.crt:/etc/nginx/https.crt:ro
      - ./docker-utils/https.key:/etc/nginx/https.key:ro
    depends_on:
      - functions
